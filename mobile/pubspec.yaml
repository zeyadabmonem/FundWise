name: fundwise
description: FundWise AI (FinPilot) — Automation-first personal finance app for Egypt.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation / Routing
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.1
  http_parser: ^2.0.1

  # Local Storage & Caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Dependency Injection
  get_it: ^7.6.7

  # UI & Charts
  google_fonts: ^6.1.0
  fl_chart: ^0.66.2
  flutter_spinkit: ^5.2.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

  # Native Capabilities & Capture
  permission_handler: ^11.3.1
  record: ^5.0.5
  image_picker: ^1.0.7
  mobile_scanner: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
